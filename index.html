<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="icon" type="image/png" href="icon.png" />
  <title>Piano Chord Trainer</title>
  <style>
    :root {
      --bg: #bfe8ff;
      --text: #0d2740;
      --subtle: rgba(13, 39, 64, 0.72);
      --panel: rgba(255, 255, 255, 0.28);
      --panel-strong: rgba(255, 255, 255, 0.46);
      --ok: #0f7b3f;
      --warn: #8a4b00;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    .center {
      text-align: center;
      padding: 1.6rem 2rem 2rem;
      width: min(92vw, 1200px);
      transform: translateY(-2.4vh);
    }

    .key-label {
      font-size: clamp(1.2rem, 2.2vw, 2rem);
      letter-spacing: 0.06em;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 1rem;
    }

    .chord {
      font-size: clamp(3rem, 9vw, 7rem);
      font-weight: 800;
      line-height: 1;
      margin: 0.1em 0;
    }

    .notes {
      font-size: clamp(1rem, 2vw, 1.4rem);
      color: var(--subtle);
      margin-top: 1rem;
      min-height: 1.4em;
    }

    .status {
      position: absolute;
      top: max(1rem, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      background: var(--panel);
      padding: 0.7rem 1rem;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
      backdrop-filter: blur(10px);
      max-width: calc(100vw - 2rem);
      text-align: center;
    }

    .detected {
      position: absolute;
      bottom: calc(max(1rem, env(safe-area-inset-bottom)) + 4.8rem);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.22);
      padding: 0.75rem 1rem;
      border-radius: 16px;
      font-size: 0.95rem;
      color: var(--subtle);
      text-align: center;
      min-width: min(80vw, 420px);
    }

    .controls {
      position: absolute;
      bottom: calc(max(1rem, env(safe-area-inset-bottom)) + 0.45rem);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.6rem;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
      width: min(96vw, 980px);
    }

    button {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 0.8rem 1rem;
      font-size: clamp(0.9rem, 1.8vw, 1rem);
      font-weight: 700;
      color: var(--text);
      background: var(--panel-strong);
      backdrop-filter: blur(10px);
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      white-space: nowrap;
      flex: 1 1 0;
      min-width: 0;
    }

    button:active { transform: translateY(1px); }

    .hidden { display: none !important; }

    .success {
      color: var(--ok);
    }

    .warning {
      color: var(--warn);
    }

    .rotate {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
      background: var(--bg);
      z-index: 50;
    }


    .menu-btn {
      position: absolute;
      top: max(1rem, env(safe-area-inset-top));
      right: max(1rem, env(safe-area-inset-right));
      width: 3rem;
      height: 3rem;
      border-radius: 16px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      z-index: 30;
    }

    .menu-btn span,
    .menu-btn span::before,
    .menu-btn span::after {
      display: block;
      width: 1.2rem;
      height: 2.5px;
      border-radius: 999px;
      background: var(--text);
      content: "";
      position: relative;
    }

    .menu-btn span::before { position: absolute; top: -0.38rem; }
    .menu-btn span::after { position: absolute; top: 0.38rem; }

    .menu-overlay {
      position: absolute;
      inset: 0;
      background: rgba(13, 39, 64, 0.18);
      backdrop-filter: blur(5px);
      z-index: 35;
    }

    .menu-panel {
      position: absolute;
      top: calc(max(1rem, env(safe-area-inset-top)) + 3.4rem);
      right: max(1rem, env(safe-area-inset-right));
      width: min(26rem, calc(100vw - 2rem));
      max-height: calc(100vh - 6rem);
      overflow: auto;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(14px);
      border-radius: 22px;
      padding: 1rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.14);
      z-index: 40;
    }

    .menu-title {
      font-size: 1rem;
      font-weight: 800;
      margin: 0 0 0.8rem 0;
    }

    .menu-subtitle {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--subtle);
      margin: 0.9rem 0 0.5rem 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .toggle-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .toggle-chip {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 0.7rem 0.9rem;
      font-size: 0.92rem;
      font-weight: 700;
      background: rgba(255,255,255,0.75);
      color: var(--text);
      box-shadow: inset 0 0 0 1.5px rgba(13,39,64,0.12);
      flex: 0 0 auto;
    }

    .toggle-chip.off {
      background: rgba(255,255,255,0.35);
      color: rgba(13,39,64,0.46);
      box-shadow: inset 0 0 0 1.5px rgba(13,39,64,0.08);
    }

    .menu-actions {
      display: flex;
      gap: 0.55rem;
      margin-top: 1rem;
    }

    .menu-actions button {
      flex: 1 1 0;
      padding: 0.7rem 0.9rem;
    }

    @media (orientation: portrait) {
      .rotate { display: flex; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="status" id="status">Open in Safari, rotate to landscape, then tap Start.</div>

    <button class="menu-btn" id="menuBtn" aria-label="Chord settings"><span></span></button>

    <div class="menu-overlay hidden" id="menuOverlay"></div>
    <div class="menu-panel hidden" id="menuPanel">
      <div class="menu-title">Chord difficulties</div>
      <div class="menu-subtitle">Quick filters</div>
      <div class="toggle-grid" id="presetGrid"></div>
      <div class="menu-subtitle">Chord types</div>
      <div class="toggle-grid" id="typeGrid"></div>
      <div class="menu-actions">
        <button id="allChordsBtn">All</button>
        <button id="closeMenuBtn">Done</button>
      </div>
    </div>

    <div class="center">
      <div class="key-label" id="keyLabel">Key: —</div>
      <div class="chord" id="chordDisplay">—</div>
      <div class="notes" id="notesDisplay"></div>
    </div>

    <div class="detected" id="detectedBox">Detected: —</div>

    <div class="detected" id="envBox" style="bottom: calc(max(1rem, env(safe-area-inset-bottom)) + 8.9rem);">Environment: checking…</div>

    <div class="controls">
      <button id="startBtn">Start</button>
      <button id="nextBtn">Skip</button>
      <button id="hintBtn">Hint</button>
      <button id="displayModeBtn">Scale Degrees</button>
    </div>

    <div class="rotate">Rotate your iPhone to landscape.</div>
  </div>

  <script>
    const NOTE_NAMES_SHARP = ["C", "C♯", "D", "E♭", "E", "F", "F♯", "G", "A♭", "A", "B♭", "B"];
    const NATURAL_NOTE_NAMES = ["C", "D♭", "D", "E♭", "E", "F", "G♭", "G", "A♭", "A", "B♭", "B"];
    const MAJOR_KEYS = ["C major", "G major", "D major", "A major", "E major", "B major", "F♯ major", "D♭ major", "A♭ major", "E♭ major", "B♭ major", "F major"];
    const MINOR_KEYS = ["A minor", "E minor", "B minor", "F♯ minor", "C♯ minor", "G♯ minor", "D♯ minor", "B♭ minor", "F minor", "C minor", "G minor", "D minor"];

    const CHORD_TYPES = [
      { name: "major", suffix: "", intervals: [0, 4, 7], category: "simple" },
      { name: "minor", suffix: "m", intervals: [0, 3, 7], category: "simple" },
      { name: "diminished", suffix: "dim", intervals: [0, 3, 6], category: "advanced" },
      { name: "augmented", suffix: "+", intervals: [0, 4, 8], category: "advanced" },
      { name: "sus2", suffix: "sus2", intervals: [0, 2, 7], category: "simple" },
      { name: "sus4", suffix: "sus4", intervals: [0, 5, 7], category: "simple" },
      { name: "add9", suffix: "add9", intervals: [0, 2, 4, 7], category: "advanced" },
      { name: "6", suffix: "6", intervals: [0, 4, 7, 9], category: "advanced" },
      { name: "m6", suffix: "m6", intervals: [0, 3, 7, 9], category: "advanced" },
      { name: "dominant 7", suffix: "7", intervals: [0, 4, 7, 10], category: "simple" },
      { name: "major 7", suffix: "maj7", intervals: [0, 4, 7, 11], category: "advanced" },
      { name: "minor 7", suffix: "m7", intervals: [0, 3, 7, 10], category: "simple" },
      { name: "minor major 7", suffix: "m(maj7)", intervals: [0, 3, 7, 11], category: "advanced" },
      { name: "half diminished 7", suffix: "m7♭5", intervals: [0, 3, 6, 10], category: "advanced" },
      { name: "diminished 7", suffix: "dim7", intervals: [0, 3, 6, 9], category: "advanced" }
    ];

    const statusEl = document.getElementById("status");
    const keyEl = document.getElementById("keyLabel");
    const chordEl = document.getElementById("chordDisplay");
    const notesEl = document.getElementById("notesDisplay");
    const detectedEl = document.getElementById("detectedBox");
    const envEl = document.getElementById("envBox");
    const startBtn = document.getElementById("startBtn");
    const nextBtn = document.getElementById("nextBtn");
    const hintBtn = document.getElementById("hintBtn");
    const displayModeBtn = document.getElementById("displayModeBtn");
    const menuBtn = document.getElementById("menuBtn");
    const menuOverlay = document.getElementById("menuOverlay");
    const menuPanel = document.getElementById("menuPanel");
    const presetGrid = document.getElementById("presetGrid");
    const typeGrid = document.getElementById("typeGrid");
    const allChordsBtn = document.getElementById("allChordsBtn");
    const closeMenuBtn = document.getElementById("closeMenuBtn");

    let audioContext = null;
    let analyser = null;
    let micSource = null;
    let freqData = null;
    let timeData = null;
    let rafId = null;
    let started = false;
    let stableHits = 0;
    let target = null;
    let lastDetectedText = "—";
    let lastAdvanceAt = 0;
    let displayMode = "notes";
    let advancePending = false;
    let advanceTimeoutId = null;

    const CHORD_PRESETS = [
      { id: "triads", label: "Triads", matches: chordType => ["", "m", "dim", "+", "sus2", "sus4"].includes(chordType.suffix) },
      { id: "7s", label: "7s", matches: chordType => ["7", "maj7", "m7", "m(maj7)", "m7♭5", "dim7"].includes(chordType.suffix) },
      { id: "color", label: "Color Chords", matches: chordType => ["add9", "6", "m6"].includes(chordType.suffix) },
      { id: "advanced", label: "Advanced", matches: chordType => chordType.category === "advanced" },
      { id: "inversions", label: "Inversions", special: "inversions" }
    ];

    const selectedChordTypes = new Set(CHORD_TYPES.map(chordType => chordType.name));
    let allowInversions = true;

    function renderEnvironment() {
      const secure = window.isSecureContext ? "secure" : "not secure";
      const hasMedia = navigator.mediaDevices && navigator.mediaDevices.getUserMedia ? "mic API available" : "no mic API";
      envEl.textContent = `Environment: ${secure} • ${hasMedia}`;
    }

    function randInt(max) {
      return Math.floor(Math.random() * max);
    }

    function choose(arr) {
      return arr[randInt(arr.length)];
    }

    function noteName(pc) {
      return NOTE_NAMES_SHARP[((pc % 12) + 12) % 12];
    }

    function bassName(pc) {
      return NATURAL_NOTE_NAMES[((pc % 12) + 12) % 12];
    }

    const LETTERS = ["C", "D", "E", "F", "G", "A", "B"];
    const NATURAL_PCS_BY_LETTER = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };

    function accidentalText(amount) {
      if (amount > 0) return "♯".repeat(amount);
      if (amount < 0) return "♭".repeat(-amount);
      return "";
    }

    function normalizeAccidentalDiff(diff) {
      let value = diff;
      while (value > 6) value -= 12;
      while (value < -6) value += 12;
      if (value > 2) value -= 12;
      if (value < -2) value += 12;
      return value;
    }

    function parseSpelledNote(name) {
      const normalized = name.replace(/#/g, "♯").replace(/b/g, "♭");
      const letter = normalized[0];
      const accidentalPart = normalized.slice(1);
      const accidental = [...accidentalPart].reduce((sum, char) => {
        if (char === "♯") return sum + 1;
        if (char === "♭") return sum - 1;
        return sum;
      }, 0);
      const pc = (NATURAL_PCS_BY_LETTER[letter] + accidental + 120) % 12;
      return { letter, accidental, pc, text: `${letter}${accidentalText(accidental)}` };
    }

    function advanceLetter(letter, steps) {
      const idx = LETTERS.indexOf(letter);
      return LETTERS[(idx + steps) % LETTERS.length];
    }

    function keyScaleSpellings(key) {
      const [tonicRaw, mode] = key.split(" ");
      const tonic = parseSpelledNote(tonicRaw);
      const intervals = mode === "minor" ? [0, 2, 3, 5, 7, 8, 10] : [0, 2, 4, 5, 7, 9, 11];
      return intervals.map((interval, degreeIndex) => {
        const letter = advanceLetter(tonic.letter, degreeIndex);
        const targetPc = (tonic.pc + interval) % 12;
        const accidental = normalizeAccidentalDiff(targetPc - NATURAL_PCS_BY_LETTER[letter]);
        const text = `${letter}${accidentalText(accidental)}`;
        return { letter, accidental, pc: targetPc, text };
      });
    }

    function spellPitchClassInKey(pc, key) {
      const candidates = keyScaleSpellings(key).map((degree) => {
        const extra = normalizeAccidentalDiff(pc - degree.pc);
        const totalAccidental = degree.accidental + extra;
        return {
          text: `${degree.letter}${accidentalText(totalAccidental)}`,
          extraAbs: Math.abs(extra),
          totalAbs: Math.abs(totalAccidental)
        };
      });
      candidates.sort((a, b) => a.extraAbs - b.extraAbs || a.totalAbs - b.totalAbs);
      return candidates[0].text;
    }

    function chordLetterSteps(interval, chordType) {
      if (interval === 0) return 0;
      if (interval === 1 || interval === 2) return chordType.suffix.includes("9") ? 8 : 1;
      if (interval === 3 || interval === 4) return 2;
      if (interval === 5) return 3;
      if (interval === 6 || interval === 7 || interval === 8) return 4;
      if (interval === 9) return 5;
      if (interval === 10 || interval === 11) return 6;
      return 0;
    }

    function spellChordTone(rootSpelling, rootPc, interval, chordType) {
      const targetPc = (rootPc + interval) % 12;
      const targetLetter = advanceLetter(rootSpelling.letter, chordLetterSteps(interval, chordType));
      const accidental = normalizeAccidentalDiff(targetPc - NATURAL_PCS_BY_LETTER[targetLetter]);
      return `${targetLetter}${accidentalText(accidental)}`;
    }

    function spelledChordTones(currentTarget) {
      if (!currentTarget) return [];
      const rootSpelling = parseSpelledNote(spellPitchClassInKey(currentTarget.root, currentTarget.key));
      return currentTarget.chordType.intervals.map(interval => spellChordTone(rootSpelling, currentTarget.root, interval, currentTarget.chordType));
    }

    function formatPitchClasses(pcs, currentTarget = null) {
      if (currentTarget) return spelledChordTones(currentTarget).join("  •  ");
      return pcs.map(pc => noteName(pc)).join("  •  ");
    }

    function inversionLabel(idx) {
      if (idx === 0) return "root position";
      if (idx === 1) return "1st inversion";
      if (idx === 2) return "2nd inversion";
      if (idx === 3) return "3rd inversion";
      return `${idx}th inversion`;
    }

    function tonicPitchClassFromKey(key) {
      const tonicText = key.split(" ")[0].replace(/#/g, "♯").replace(/b/g, "♭");
      return NOTE_NAMES_SHARP.indexOf(tonicText);
    }

    function romanNumeralForSemitone(semitones) {
      const numerals = {
        0: "I",
        1: "♭II",
        2: "II",
        3: "♭III",
        4: "III",
        5: "IV",
        6: "♭V",
        7: "V",
        8: "♭VI",
        9: "VI",
        10: "♭VII",
        11: "VII"
      };
      return numerals[((semitones % 12) + 12) % 12];
    }

    function degreeSymbolForPitchClass(pc, key) {
      const tonicPc = tonicPitchClassFromKey(key);
      const distance = ((pc - tonicPc) % 12 + 12) % 12;
      return romanNumeralForSemitone(distance);
    }

    function romanCaseForChordType(chordType) {
      const minorLike = new Set([
        "minor",
        "m6",
        "minor 7",
        "minor major 7",
        "half diminished 7",
        "diminished",
        "diminished 7"
      ]);
      return minorLike.has(chordType.name) ? "lower" : "upper";
    }

    function romanSuffixForChordType(chordType) {
      switch (chordType.name) {
        case "major":
        case "minor":
          return "";
        case "diminished":
          return "dim";
        case "augmented":
          return "+";
        case "sus2":
          return "sus2";
        case "sus4":
          return "sus4";
        case "add9":
          return "add9";
        case "6":
        case "m6":
          return "6";
        case "dominant 7":
        case "minor 7":
        case "half diminished 7":
          return "7";
        case "major 7":
          return "maj7";
        case "minor major 7":
          return "(maj7)";
        case "diminished 7":
          return "dim7";
        default:
          return chordType.suffix || "";
      }
    }

    function romanChordSymbolForTarget(currentTarget) {
      const rootDegreeRaw = degreeSymbolForPitchClass(currentTarget.root, currentTarget.key);
      const rootDegree = romanCaseForChordType(currentTarget.chordType) === "lower"
        ? rootDegreeRaw.toLowerCase()
        : rootDegreeRaw;
      const suffix = romanSuffixForChordType(currentTarget.chordType);
      const bassDegree = degreeSymbolForPitchClass(currentTarget.bassPc, currentTarget.key);
      const symbolBase = `${rootDegree}${suffix}`;
      return currentTarget.inversion === 0 ? symbolBase : `${symbolBase}/${bassDegree}`;
    }

    function displaySymbolForTarget(currentTarget) {
      if (!currentTarget) return "—";
      if (displayMode === "notes") return currentTarget.symbol;
      return romanChordSymbolForTarget(currentTarget);
    }

    function updateDisplayModeButton() {
      displayModeBtn.textContent = displayMode === "notes" ? "Scale Degrees" : "Note Names";
    }

    function getEnabledChordTypes() {
      const enabled = CHORD_TYPES.filter(chordType => selectedChordTypes.has(chordType.name));
      return enabled.length ? enabled : CHORD_TYPES;
    }

    function updateMenuButtonStates() {
      presetGrid.querySelectorAll("[data-preset-id]").forEach((btn) => {
        const preset = CHORD_PRESETS.find(item => item.id === btn.dataset.presetId);
        let active = false;
        if (preset.special === "inversions") {
          active = allowInversions;
        } else {
          const matched = CHORD_TYPES.filter(chordType => preset.matches(chordType));
          active = matched.length > 0 && matched.every(chordType => selectedChordTypes.has(chordType.name));
        }
        btn.classList.toggle("off", !active);
      });

      typeGrid.querySelectorAll("[data-type-name]").forEach((btn) => {
        const active = selectedChordTypes.has(btn.dataset.typeName);
        btn.classList.toggle("off", !active);
      });
    }

    function buildDifficultyMenu() {
      presetGrid.innerHTML = "";
      typeGrid.innerHTML = "";

      CHORD_PRESETS.forEach((preset) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "toggle-chip";
        btn.textContent = preset.label;
        btn.dataset.presetId = preset.id;
        btn.addEventListener("click", () => {
          if (preset.special === "inversions") {
            allowInversions = !allowInversions;
          } else {
            const matched = CHORD_TYPES.filter(chordType => preset.matches(chordType));
            const allSelected = matched.every(chordType => selectedChordTypes.has(chordType.name));
            matched.forEach((chordType) => {
              if (allSelected) {
                if (selectedChordTypes.size > 1) selectedChordTypes.delete(chordType.name);
              } else {
                selectedChordTypes.add(chordType.name);
              }
            });
            if (!selectedChordTypes.size) {
              selectedChordTypes.add(CHORD_TYPES[0].name);
            }
          }
          updateMenuButtonStates();
          if (target) {
            setStatus("Chord filters updated.");
          }
        });
        presetGrid.appendChild(btn);
      });

      CHORD_TYPES.forEach((chordType) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "toggle-chip";
        btn.textContent = chordType.suffix || "major";
        btn.dataset.typeName = chordType.name;
        btn.addEventListener("click", () => {
          const isActive = selectedChordTypes.has(chordType.name);
          if (isActive && selectedChordTypes.size > 1) {
            selectedChordTypes.delete(chordType.name);
          } else {
            selectedChordTypes.add(chordType.name);
          }
          updateMenuButtonStates();
          if (target) {
            setStatus("Chord filters updated.");
          }
        });
        typeGrid.appendChild(btn);
      });

      updateMenuButtonStates();
    }

    function setMenuOpen(isOpen) {
      menuOverlay.classList.toggle("hidden", !isOpen);
      menuPanel.classList.toggle("hidden", !isOpen);
    }

    function buildTarget() {
      const root = randInt(12);
      const enabledChordTypes = getEnabledChordTypes();
      const chordType = choose(enabledChordTypes);
      const inversion = allowInversions ? randInt(chordType.intervals.length) : 0;
      const pcs = chordType.intervals.map(i => (root + i) % 12);
      const bassPc = pcs[inversion];
      const key = Math.random() < 0.5 ? choose(MAJOR_KEYS) : choose(MINOR_KEYS);
      const rootName = noteName(root);
      const symbolBase = `${rootName}${chordType.suffix}`;
      const symbol = inversion === 0 ? symbolBase : `${symbolBase}/${bassName(bassPc)}`;
      const targetObj = {
        key,
        root,
        chordType,
        inversion,
        symbol,
        pcs: [...new Set(pcs)],
        bassPc
      };
      targetObj.hint = `${symbol} = ${formatPitchClasses(pcs, targetObj)} (${inversionLabel(inversion)})`;
      return targetObj;
    }

    function renderTarget() {
      keyEl.textContent = `Key: ${target.key}`;
      chordEl.textContent = displaySymbolForTarget(target);
      notesEl.textContent = "";
      detectedEl.textContent = `Detected: ${lastDetectedText}`;
      updateDisplayModeButton();
    }

    function clearAdvanceTimeout() {
      if (advanceTimeoutId) {
        clearTimeout(advanceTimeoutId);
        advanceTimeoutId = null;
      }
    }

    function nextTarget() {
      clearAdvanceTimeout();
      target = buildTarget();
      stableHits = 0;
      advancePending = false;
      lastDetectedText = "—";
      renderTarget();
      setStatus("Listening for the correct chord.");
    }

    function setStatus(msg, cls = "") {
      statusEl.textContent = msg;
      statusEl.className = `status ${cls}`.trim();
    }

    async function startAudio() {
      if (started) return;
      try {
        if (!window.isSecureContext) {
          setStatus("Mic needs a secure page. Open this through Safari on https:// or localhost, not directly from Files.", "warning");
          return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setStatus("This browser session does not expose microphone access.", "warning");
          return;
        }

        setStatus("Requesting microphone access…");

        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false
          }
        });

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === "suspended") {
          await audioContext.resume();
        }

        analyser = audioContext.createAnalyser();
        analyser.fftSize = 8192;
        analyser.smoothingTimeConstant = 0.15;

        micSource = audioContext.createMediaStreamSource(stream);
        micSource.connect(analyser);

        freqData = new Float32Array(analyser.frequencyBinCount);
        timeData = new Float32Array(analyser.fftSize);

        started = true;
        startBtn.textContent = "Mic On";
        startBtn.disabled = true;
        envEl.classList.add("hidden");
        nextTarget();
        listenLoop();
      } catch (err) {
        console.error(err);
        const msg = err && err.name ? err.name : "Unknown error";
        setStatus(`Microphone start failed: ${msg}. Use Safari and allow mic access.`, "warning");
      }
    }

    function midiToFreq(midi) {
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function freqToMidi(freq) {
      return Math.round(69 + 12 * Math.log2(freq / 440));
    }

    function getRms() {
      analyser.getFloatTimeDomainData(timeData);
      let sum = 0;
      for (let i = 0; i < timeData.length; i++) {
        sum += timeData[i] * timeData[i];
      }
      return Math.sqrt(sum / timeData.length);
    }

    function analyzeChord() {
      if (!analyser) return null;
      const rms = getRms();
      if (rms < 0.008) return null;

      analyser.getFloatFrequencyData(freqData);
      const nyquist = audioContext.sampleRate / 2;
      const binHz = nyquist / freqData.length;
      const pitchScores = new Array(12).fill(0);
      const noteScores = new Map();
      const peaks = [];

      for (let midi = 36; midi <= 96; midi++) {
        const f = midiToFreq(midi);
        const bin = Math.round(f / binHz);
        if (bin < 2 || bin >= freqData.length - 2) continue;
        const value = Math.max(freqData[bin - 1], freqData[bin], freqData[bin + 1]);
        if (value < -78) continue;
        const linear = Math.pow(10, value / 20);
        const pc = ((midi % 12) + 12) % 12;
        pitchScores[pc] += linear;
        noteScores.set(midi, (noteScores.get(midi) || 0) + linear);
        peaks.push({ midi, pc, linear });
      }

      const maxPc = Math.max(...pitchScores);
      if (maxPc <= 0.0001) return null;

      const activePcs = [];
      for (let pc = 0; pc < 12; pc++) {
        if (pitchScores[pc] >= maxPc * 0.28) activePcs.push(pc);
      }
      if (activePcs.length < 2) return null;

      const sortedNotes = [...noteScores.entries()]
        .filter(([, score]) => score >= Math.max(...noteScores.values()) * 0.08)
        .sort((a, b) => a[0] - b[0]);

      if (!sortedNotes.length) return null;

      const bassMidi = sortedNotes[0][0];
      const bassPc = ((bassMidi % 12) + 12) % 12;

      return {
        activePcs,
        bassPc,
        bassMidi,
        text: `${activePcs.map(noteName).join(" ")} | bass ${bassName(bassPc)}`
      };
    }

    function arraysEqualAsSets(a, b) {
      if (a.length !== b.length) return false;
      const aa = [...new Set(a)].sort((x, y) => x - y);
      const bb = [...new Set(b)].sort((x, y) => x - y);
      if (aa.length !== bb.length) return false;
      return aa.every((value, index) => value === bb[index]);
    }

    function isTargetMatch(detected) {
      if (!detected || !target) return false;
      const exact = arraysEqualAsSets(detected.activePcs, target.pcs);
      const extraOne = detected.activePcs.filter(pc => !target.pcs.includes(pc)).length <= 1;
      const missingNone = target.pcs.every(pc => detected.activePcs.includes(pc));
      const pcsMatch = exact || (missingNone && extraOne && detected.activePcs.length <= target.pcs.length + 1);
      const bassMatch = detected.bassPc === target.bassPc;
      return pcsMatch && bassMatch;
    }

    function confirmAndAdvance() {
      if (!target || advancePending) return;
      advancePending = true;
      lastAdvanceAt = Date.now();
      setStatus(`Correct: ${target.symbol}`, "success");
      clearAdvanceTimeout();
      advanceTimeoutId = setTimeout(() => {
        nextTarget();
      }, 220);
    }

    function listenLoop() {
      const detected = analyzeChord();
      if (detected) {
        lastDetectedText = detected.text;
        detectedEl.textContent = `Detected: ${detected.text}`;
        if (isTargetMatch(detected)) {
          stableHits += 1;
          if (stableHits >= 2) {
            confirmAndAdvance();
          } else if (!advancePending) {
            setStatus(`Match detected. Hold briefly…`);
          }
        } else {
          stableHits = 0;
        }
      } else {
        detectedEl.textContent = "Detected: listening…";
        stableHits = 0;
      }

      rafId = requestAnimationFrame(listenLoop);
    }

    startBtn.addEventListener("click", startAudio);
    startBtn.addEventListener("touchend", (e) => { e.preventDefault(); startAudio(); }, { passive: false });
    nextBtn.addEventListener("click", () => {
      if (!started) return;
      nextTarget();
    });

    hintBtn.addEventListener("click", () => {
      if (!target) return;
      notesEl.textContent = target.hint;
    });

    displayModeBtn.addEventListener("click", () => {
      displayMode = displayMode === "notes" ? "degrees" : "notes";
      renderTarget();
    });

    menuBtn.addEventListener("click", () => setMenuOpen(true));
    closeMenuBtn.addEventListener("click", () => setMenuOpen(false));
    menuOverlay.addEventListener("click", () => setMenuOpen(false));
    allChordsBtn.addEventListener("click", () => {
      CHORD_TYPES.forEach(chordType => selectedChordTypes.add(chordType.name));
      allowInversions = true;
      updateMenuButtonStates();
      setStatus("All chord types enabled.");
    });

    buildDifficultyMenu();
    renderEnvironment();
    updateDisplayModeButton();

    document.addEventListener("keydown", (e) => { if (e.key === "Escape") setMenuOpen(false); });

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible" && audioContext && audioContext.state === "suspended") {
        await audioContext.resume();
      }
    });
  </script>
</body>
</html>
